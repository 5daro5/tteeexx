<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Магазин красоты</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
    <div class="decorative-circle"></div>
    <div class="decorative-circle"></div>
    <div class="decorative-circle"></div>

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">🌸 Вход в систему</h2>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required placeholder="ваш@email.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" required placeholder="Введите пароль">
                </div>

                <button type="submit" class="btn-primary auth-btn">Войти в систему</button>
            </form>

            <div class="auth-switch">
                <p>Нет аккаунта? <a href="#" id="showRegister">Создать аккаунт</a></p>
            </div>

            <form id="registerForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label for="regName">Имя:</label>
                    <input type="text" id="regName" required placeholder="Ваше имя">
                </div>

                <div class="form-group">
                    <label for="regEmail">Email:</label>
                    <input type="email" id="regEmail" required placeholder="ваш@email.com">
                </div>
                
                <div class="form-group">
                    <label for="regPassword">Пароль:</label>
                    <input type="password" id="regPassword" required placeholder="Придумайте пароль">
                </div>

                <button type="submit" class="btn-primary auth-btn">Создать аккаунт</button>
            </form>

            <div class="auth-switch" id="registerSwitch" style="display: none;">
                <p>Уже есть аккаунт? <a href="#" id="showLogin">Войти в систему</a></p>
            </div>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="login.js"></script>
    <script src="register.js"></script>
</body>
</html>
