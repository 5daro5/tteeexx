<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Магазин красоты</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
    <div class="decorative-circle"></div>
    <div class="decorative-circle"></div>
    <div class="decorative-circle"></div>

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Создание аккаунта</h2>
            <p class="auth-subtitle">Присоединяйтесь к нашему сообществу красоты</p>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="regName">Имя:</label>
                    <input type="text" id="regName" required placeholder="Ваше имя">
                    <div id="regNameError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="regEmail">Email:</label>
                    <input type="email" id="regEmail" required placeholder="ваш@email.com">
                    <div id="regEmailError" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label for="regPassword">Пароль:</label>
                    <input type="password" id="regPassword" required placeholder="Придумайте пароль">
                    <div class="password-hint">
                        Пароль должен содержать минимум 6 символов, включая заглавную букву и цифру
                    </div>
                    <div id="regPasswordError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="regConfirmPassword">Подтвердите пароль:</label>
                    <input type="password" id="regConfirmPassword" required placeholder="Повторите пароль">
                    <div id="regConfirmPasswordError" class="error-message"></div>
                </div>

                <div class="form-group terms-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        Я согласен с <a href="#" class="terms-link">условиями использования</a> и 
                        <a href="#" class="terms-link">политикой конфиденциальности</a>
                    </label>
                </div>

                <button type="submit" class="btn-primary auth-btn">
                    Создать аккаунт
                </button>
            </form>

            <div class="auth-divider">
                <span>или</span>
            </div>

            <div class="social-registration">
                <button class="social-btn google-btn">
                    <span class="social-icon">🔍</span>
                    Продолжить с Google
                </button>
                <button class="social-btn facebook-btn">
                    <span class="social-icon">👤</span>
                    Продолжить с Facebook
                </button>
            </div>

            <div class="auth-switch">
                <p>Уже есть аккаунт? <a href="login.html" id="showLogin">Войти в систему</a></p>
            </div>
        </div>
    </div>

    <script src="register.js"></script>
    
    <style>
        .auth-subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 2rem;
        }
        
        .password-hint {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 5px;
            line-height: 1.4;
        }
        
        .terms-group {
            flex-direction: row;
            align-items: flex-start;
            gap: 10px;
            margin: 1rem 0;
        }
        
        .terms-group input[type="checkbox"] {
            margin-top: 3px;
            width: 16px;
            height: 16px;
        }
        
        .terms-link {
            color: var(--primary-pink);
            text-decoration: none;
        }
        
        .terms-link:hover {
            text-decoration: underline;
        }
        
        .auth-divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: var(--text-light);
        }
        
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--light-lilac);
        }
        
        .auth-divider span {
            padding: 0 1rem;
        }
        
        .social-registration {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .social-btn {
            padding: 1rem;
            border: 2px solid var(--light-lilac);
            border-radius: 15px;
            background: var(--soft-white);
            color: var(--text-dark);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--shadow);
            border-color: var(--primary-pink);
        }
        
        .social-icon {
            font-size: 1.2rem;
        }
        
        .google-btn:hover {
            background: linear-gradient(135deg, #f8f8f8 0%, #fff 100%);
        }
        
        .facebook-btn:hover {
            background: linear-gradient(135deg, #f0f4ff 0%, #fff 100%);
        }
    </style>
</body>
</html>
